<!DOCTYPE html>
<html dir="rtl" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فیش فرم صدور پاسپورت</title>
  <link rel="stylesheet" href="styles/receipt.css">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/form.css">
</head>

<body>
  <div class="center">
    <table>
      <thead>
        <tr>
          <th class="title" colspan="5">فیش فرم صدور پاسپورت</th>
        </tr>
        <tr>
          <th colspan="5">
            <span>تاریخ:</span>
            <span class="date">1405/12/12</span>
          </th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" class="span-row">تعداد</td>
        </tr>
        <tr>
          <td>1</td>
          <td>2</td>
          <td>3</td>
          <td>4</td>
          <td>5</td>
        </tr>
        <tr>
          <td>6</td>
          <td>7</td>
          <td>8</td>
          <td>9</td>
          <td>10</td>
        </tr>
        <tr>
          <td class="span-row" colspan="5">قیمت</td>
        </tr>
        <tr>
          <td class="price-cell">80</td>
          <td class="price-cell">160</td>
          <td class="price-cell">240</td>
          <td class="price-cell">320</td>
          <td class="price-cell">400</td>
        </tr>
        <tr>
          <td class="price-cell">400</td>
          <td class="price-cell">480</td>
          <td class="price-cell">560</td>
          <td class="price-cell">640</td>
          <td class="price-cell">720</td>
      </tbody>
    </table>
  </div>

  <div class="center">
    <form>
      <div class="fields">
        <div class="field">
          <label for="price">هزینه</label>
          <input autofocus type="number" min="80" max="200" value="80"
            placeholder="برای یک فرم چقدر هزینه دریافت میکنید؟" name="price" id="price">
        </div>

        <div class="field">
          <label for="date">تاریخ</label>
          <input type="date" name="date" id="date">
        </div>
      </div>
      <input type="submit" value="چاپ">
    </form>
  </div>
</body>

</html>
